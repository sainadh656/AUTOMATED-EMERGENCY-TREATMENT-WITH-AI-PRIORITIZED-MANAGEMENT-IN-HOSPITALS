<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Assistant AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== BACKGROUND ===== */

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0ea5e9,#14b8a6,#22d3ee,#3b82f6);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
min-height:100vh;
padding-bottom:120px;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* ===== NAVBAR ===== */

.navbar-custom{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
padding:12px 40px;
}

.navbar-custom a{
color:white;
text-decoration:none;
margin-right:20px;
font-weight:500;
transition:0.3s;
}

.navbar-custom a:hover{
color:#ffe082;
}

.logout{
background:#ef4444;
padding:6px 15px;
border-radius:20px;
}

/* ===== TITLE ===== */

.page-title{
text-align:center;
color:white;
margin-top:30px;
font-weight:600;
}

/* ===== CHAT CONTAINER ===== */

.chat-container{
max-width:900px;
margin:auto;
margin-top:30px;
background:rgba(255,255,255,0.95);
border-radius:20px;
padding:25px;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

/* ===== CHAT BOX ===== */

#chat-box{
height:280px;
overflow-y:auto;
background:#f8fafc;
border-radius:15px;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

/* ===== MESSAGES ===== */

.message{
max-width:75%;
padding:12px 16px;
border-radius:18px;
font-size:15px;
}

.user-message{
background:#2563eb;
color:white;
align-self:flex-end;
border-bottom-right-radius:5px;
}

.bot-message{
background:#e5e7eb;
color:#111;
align-self:flex-start;
border-bottom-left-radius:5px;
}

.message strong{
font-size:12px;
display:block;
opacity:0.7;
margin-bottom:4px;
}

/* ===== ASK BOX ===== */

.ask-container{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:900px;
}

.ask-box{
display:flex;
background:white;
border-radius:50px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
overflow:hidden;
}

.ask-box input{
flex:1;
border:none;
padding:14px 20px;
outline:none;
font-size:15px;
}

.ask-box button{
background:#2563eb;
color:white;
border:none;
padding:14px 30px;
font-weight:bold;
transition:0.3s;
}

.ask-box button:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<!-- ===== NAVBAR ===== -->

<nav class="navbar navbar-custom d-flex justify-content-between">

<div>
<a href="{{ url_for('appointments') }}">Appointments</a>
<a href="{{ url_for('medical') }}">Medical Chat</a>
<a href="{{ url_for('nutrition') }}">Nutrition AI</a>
<a href="{{ url_for('scan') }}">MRI Scan</a>
</div>

<a href="{{ url_for('logout') }}" class="logout">Logout</a>

</nav>


<h2 class="page-title">🩺 Medical AI Assistant</h2>


<!-- CHAT AREA -->

<div class="chat-container">

<div id="chat-box"></div>

</div>


<!-- ASK BOX -->

<div class="ask-container">

<div class="ask-box">

<input type="text" id="user-input" placeholder="Ask about diseases, medicines, symptoms...">

<button onclick="sendMessage()">Send</button>

</div>

</div>


<script>

async function sendMessage(){

const input=document.getElementById("user-input");
const text=input.value.trim();

if(!text) return;

appendMessage("You",text,"user-message");

input.value="";

try{

const response=await fetch("/query",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

const data=await response.json();

appendMessage("Bot",data.reply || "Something went wrong","bot-message");

}catch{

appendMessage("Bot","Server error. Try again.","bot-message");

}

}

function appendMessage(sender,message,className){

const chatBox=document.getElementById("chat-box");

const div=document.createElement("div");

div.classList.add("message",className);

div.innerHTML=`<strong>${sender}</strong>${message}`;

chatBox.appendChild(div);

chatBox.scrollTop=chatBox.scrollHeight;

}

</script>

</body>
</html>
