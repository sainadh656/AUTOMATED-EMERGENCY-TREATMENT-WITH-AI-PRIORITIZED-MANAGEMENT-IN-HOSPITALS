<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI-Prioritized Management in Hospitals</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

body {
    background: linear-gradient(135deg, #141e30, #243b55);
    min-height: 100vh;
    color: white;
    display: flex;
    flex-direction: column;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 30px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
}

.header h1 {
    font-size: 1.6rem;
    font-weight: bold;
    color: #ff6b6b;
}

.btn-home {
    padding: 8px 16px;
    background: linear-gradient(135deg, #36d1dc, #5b86e5);
    color: white;
    border: none;
    border-radius: 12px;
    text-decoration: none;
}

/* Layout */
.main-container {
    display: flex;
    flex: 1;
    justify-content: center;
    gap: 30px;
    padding: 30px;
    flex-wrap: wrap;
}

/* Glass Card */
.glass-card {
    background: rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    backdrop-filter: blur(15px);
    padding: 25px;
    width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.card-title {
    font-size: 22px;
    margin-bottom: 15px;
    color: #ff6b6b;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: white;
}

/* Video */
video {
    width: 100%;
    height: 250px;
    border-radius: 12px;
    background: black;
    margin-bottom: 15px;
}

/* Buttons */
.btn-custom {
    width: 100%;
    padding: 10px;
    border-radius: 12px;
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    border: none;
    color: white;
    margin-top: 8px;
}

/* Thumbnails */
.captures {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
}

.captures img {
    width: 80px;
    border-radius: 8px;
}

/* Voice Indicator */
.recording-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-size: 14px;
    color: #ff4b2b;
    font-weight: bold;
}

.recording-indicator span {
    width: 12px;
    height: 12px;
    background: #ff4b2b;
    border-radius: 50%;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
}
.btn-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: space-between;
}

.btn-grid .btn-custom {
    width: 48%; /* two buttons per row */
    margin-top: 5px;
}
</style>
</head>

<body>
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
{% endwith %}
<!-- Header -->
<div class="header">
    <h1>AI-Prioritized Management in Hospitals</h1>
    <a href="/" class="btn-home">Home</a>
</div>

<div class="main-container">

    <!-- Webcam -->
    <div class="glass-card">
        <div class="card-title">Live Webcam</div>

        <video id="regcam" autoplay playsinline></video>
        <div class="captures" id="capturesContainer"></div>

        <div class="btn-grid">
    <button class="btn btn-custom" onclick="startRegCamera()">Start Camera</button>
    <button class="btn btn-custom" onclick="captureFace()" id="faceBtn">Capture Face</button>
    <button class="btn btn-custom" onclick="capturePalm()" id="palmBtn">Capture Palm</button>
    <button class="btn btn-custom" onclick="startVoice()" id="voiceBtn">Capture Voice</button>
</div>

        <div class="recording-indicator" id="voiceIndicator" style="display:none;">
            <span></span> Recording...
        </div>
    </div>

    <!-- Registration -->
    <div class="glass-card">
        <div class="card-title">Register New Patient</div>

        <form action="/add" method="POST">
            <label>Username</label>
            <input type="text" name="newusername" placeholder="Enter username" required>

            <label>User ID</label>
            <input type="number" name="newuserid" placeholder="Enter user ID" required>

            <label>Password</label>
            <input type="password" name="newuserpassword"  placeholder="Enter password" required>

            <label>Email</label>
            <input type="email" name="newuseremail" placeholder="Enter email address" required>

            <button class="btn btn-custom" type="submit" id="signupBtn">Sign Up</button>
        </form>
    </div>

</div>

<script>
let stream, mediaRecorder, chunks = [];

/* Buttons */
const faceBtn = document.getElementById("faceBtn");
const palmBtn = document.getElementById("palmBtn");
const voiceBtn = document.getElementById("voiceBtn");
const signupBtn = document.getElementById("signupBtn");

/* Initial State */
window.onload = () => {
    faceBtn.disabled = true;
    palmBtn.disabled = true;
    voiceBtn.disabled = true;
    signupBtn.disabled = true;
};

/* Start Camera */
async function startRegCamera() {
    const video = document.getElementById("regcam");
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;

    faceBtn.disabled = false;
}

/* Face */
function captureFace() {
    captureMultipleImages("face", 5).then(() => {
        palmBtn.disabled = false;
        faceBtn.disabled = true;
    });
}

/* Palm */
function capturePalm() {
    captureMultipleImages("palm", 5).then(() => {
        voiceBtn.disabled = false;
        palmBtn.disabled = true;
    });
}

/* Capture Images */
async function captureMultipleImages(type, count) {
    const video = document.getElementById("regcam");
    const container = document.getElementById("capturesContainer");
    const username = document.querySelector('[name="newusername"]').value;

    if (!username) {
        alert("Enter username first!");
        return;
    }

    for (let i = 0; i < count; i++) {
        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0);

        const imageData = canvas.toDataURL("image/png");

        const img = document.createElement("img");
        img.src = imageData;
        container.appendChild(img);

        await fetch('/biometric_capture', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ image: imageData, type, username })
        });

        await new Promise(r => setTimeout(r, 500));
    }

    alert(type + " capture complete!");
}

/* Voice */
async function startVoice() {
    const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(audioStream);
    chunks = [];

    const indicator = document.getElementById("voiceIndicator");
    indicator.style.display = "flex";

    mediaRecorder.ondataavailable = e => chunks.push(e.data);

    mediaRecorder.onstop = async () => {
        const blob = new Blob(chunks, { type: 'audio/wav' });
        const formData = new FormData();

        formData.append("voice", blob);
        formData.append("username", document.querySelector('[name="newusername"]').value);

        await fetch('/voice_capture', { method: 'POST', body: formData });

        indicator.style.display = "none";

        signupBtn.disabled = false;
        voiceBtn.disabled = true;

        alert("Voice capture complete!");
    };

    mediaRecorder.start();
    setTimeout(() => mediaRecorder.stop(), 8000);
}
</script>

</body>
</html>
