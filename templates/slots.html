<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Select Appointment Slot</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.card{
border-radius:10px;
}

.available{
color:green;
font-weight:600;
}

.reserved{
color:red;
font-weight:600;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow p-4">

<h4 class="mb-3">Select Appointment Slot</h4>

<hr>

<form method="POST" action="/approve/{{ id }}">

<label class="form-label">Appointment Slots</label>

<select name="scheduled_datetime" class="form-select mb-3" required>

{% for slot in all_slots %}

{% if slot in reserved_slots %}

<option disabled class="reserved">
{{ slot }} - Reserved
</option>

{% else %}

<option value="{{ slot }}" class="available">
{{ slot }} - Available
</option>

{% endif %}

{% endfor %}

</select>

<button class="btn btn-success w-100">
Approve & Reserve Slot
</button>

</form>

<hr>

<h6 class="mt-3">Reserved Slots</h6>

<div class="list-group">

{% if reserved_slots %}

{% for slot in reserved_slots %}
<div class="list-group-item text-danger">
{{ slot }} - Reserved
</div>
{% endfor %}

{% else %}

<div class="text-muted">
No reserved slots
</div>

{% endif %}

</div>

<a href="/admin_dashboard" class="btn btn-secondary mt-3 w-100">
Back to Dashboard
</a>

</div>

</div>

</div>

</div>

</body>

</html>
