<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointment Analytics Dashboard</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    margin: 0;
    background: #ffffff;
    color: #333;
    padding: 40px 20px;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
}
.header h3 {
    font-weight: 700;
    font-size: 2.4rem;
    color: #1a1a1a;
}
.btn-secondary {
    border-radius: 14px;
    font-weight: 600;
    padding: 12px 24px;
    transition: all 0.3s ease;
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    color: #fff;
}
.btn-secondary:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.25);
}

/* Cards */
.card {
    border-radius: 20px;
    padding: 30px 25px;
    background: #f8f9fa;
    text-align: center;
    margin-bottom: 25px;
    transition: transform 0.4s, box-shadow 0.4s;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}
.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.12);
}
.card h5 {
    font-weight: 600;
    margin-bottom: 15px;
    text-transform: uppercase;
    color: #555;
}
.card h2 {
    font-weight: 800;
    font-size: 2.4rem;
}

/* Chart Card */
.chart-card {
    border-radius: 20px;
    padding: 35px;
    background: #f8f9fa;
    box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    height: 100%;
}

/* Responsive adjustments */
@media (max-width: 992px) {
    .header h3 { font-size: 2rem; }
    .card h2 { font-size: 2rem; }
}
</style>
</head>
<body>

<div class="container mt-4">
    <!-- Header -->
    <div class="header">
        <h3>📊 Appointment Analytics</h3>
        <a href="/admin_dashboard" class="btn btn-secondary">⬅ Back to Dashboard</a>
    </div>

    <!-- Two-column layout -->
    <div class="row">
        <!-- Left column: stacked cards -->
        <div class="col-md-4 d-flex flex-column justify-content-start">
            <div class="card text-warning">
                <h5>Pending</h5>
                <h2>{{ pending }}</h2>
            </div>
            <div class="card text-success">
                <h5>Approved</h5>
                <h2>{{ approved }}</h2>
            </div>
            <div class="card text-danger">
                <h5>Rejected</h5>
                <h2>{{ rejected }}</h2>
            </div>
        </div>

        <!-- Right column: chart -->
        <div class="col-md-8">
            <div class="chart-card">
                <canvas id="statusChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
const ctx = document.getElementById('statusChart').getContext('2d');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Pending', 'Approved', 'Rejected'],
        datasets: [{
            label: 'Appointments',
            data: [{{ pending }}, {{ approved }}, {{ rejected }}],
            backgroundColor: ['#ffc107','#28a745','#dc3545'],
            borderRadius: 8,
            barPercentage: 0.7,
            borderSkipped: false
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { display: false },
            tooltip: { backgroundColor: '#333', titleColor: '#fff', bodyColor: '#fff', titleFont: {weight:700} }
        },
        scales: {
            y: { 
                beginAtZero: true, 
                ticks: { color: '#333', stepSize: 1, font: {size:14, weight:'600'} },
                grid: { color: 'rgba(0,0,0,0.05)', borderDash: [5,5] }
            },
            x: { 
                ticks: { color: '#333', font: {size:14, weight:'600'} },
                grid: { color: 'rgba(0,0,0,0.05)', borderDash: [5,5] }
            }
        }
    }
});
</script>

</body>
</html>
