<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Admission Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Roboto',sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.card{
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.2);
    border-radius:15px;
    padding:30px;
    box-shadow:0 10px 35px rgba(0,0,0,0.2);
}

h3{
    color:#fff;
    font-weight:700;
    text-align:center;
}

input,select,textarea{
    border-radius:8px;
    border:none;
    padding:10px;
    background:rgba(255,255,255,0.8);
}

textarea{
    resize:none;
}

.btn-success{
    border-radius:40px;
}

.top-links{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container animate__animated animate__fadeIn">

<div class="top-links">
<a href="/track" class="btn btn-secondary w-50">📄 Track Appointment</a>
<a href="/emergencydashboard" class="btn btn-secondary w-50">📄 Report Emergency</a>
<a href="/ambulance_map" class="btn btn-secondary w-50">📄 Doctor Slot Availability</a>
<a href="/medical" class="btn btn-secondary w-50">⬅ Back Home</a>
</div>

<div class="card animate__animated animate__fadeInUp">

<h3>🏥 Patient Admission Form</h3>
<hr style="border-color:white">

<form method="POST" action="admission">

<div class="row g-3">

<div class="col-md-6">
<input type="number" name="patientid" class="form-control" placeholder="Aadhar ID" required>
</div>

<div class="col-md-6">
<input type="text" name="patient_name" class="form-control" placeholder="Patient Name" required>
</div>

<div class="col-md-6">
<input type="number" name="age" class="form-control" placeholder="Age" required>
</div>

<div class="col-md-6">
<select name="gender" class="form-control" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="col-md-6">
<select name="blood_group" class="form-control" required>
<option value="">-- Select Blood Group --</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>
</div>

<div class="col-md-6">
<input type="number" name="phone" class="form-control" placeholder="Patient Phone" required>
</div>

<!-- Hospital -->

<div class="col-md-6">
<select id="hospital" name="hospital" class="form-control" required>

<option value="">--Select Hospital--</option>

{% for h in hospitals %}
<option value="{{h.hospital_name}}">
{{h.hospital_name}}
</option>
{% endfor %}

</select>
</div>

<div class="col-md-6">
<input type="email" name="email" class="form-control" placeholder="Email" required>
</div>

<div class="col-md-6">
<textarea name="address" class="form-control" placeholder="Address" required></textarea>
</div>

<div class="col-md-6">
<textarea name="symptoms" class="form-control" placeholder="Symptoms" required></textarea>
</div>

<div class="col-md-6">
<textarea name="diagnosis" class="form-control" placeholder="medication history" required></textarea>
</div>

<div class="col-md-6">
<textarea name="admission_reason" class="form-control" placeholder="Reason for Admission" required></textarea>
</div>

<!-- Doctor Dropdown -->

<div class="col-md-6">
<select id="doctor" name="doctor_assigned" class="form-control">
<option value="">--Select Doctor--</option>
</select>
</div>

<!-- Specialization -->

<div class="col-md-6">
<input type="datetime-local" name="admission_date" class="form-control" required>
</div>

<div class="col-12 mt-3">
<button type="submit" class="btn btn-success w-100">Admit Patient</button>
</div>

</div>

</form>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

document.getElementById("hospital").addEventListener("change", function(){

    let hospital = this.value;

    fetch("/get_doctors",{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:"hospital="+hospital
    })
    .then(response=>response.json())
    .then(data=>{

        let doctorSelect = document.getElementById("doctor");

        doctorSelect.innerHTML="<option value=''>--Select Doctor--</option>";

        data.forEach(function(d){

            let option=document.createElement("option");

            option.value=d.name;
            option.text=d.name+" ("+d.specialization+")";

            option.setAttribute("data-spec",d.specialization);

            doctorSelect.appendChild(option);

        });

    });

});


document.getElementById("doctor").addEventListener("change",function(){

    let spec=this.options[this.selectedIndex].getAttribute("data-spec");

    document.getElementById("specialization").value=spec;

});

</script>

</body>
</html>
