<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login Page</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: rgba(0,0,0,0.4);
}

.header h1 {
    font-size: 24px;
}

.home-btn {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

.main-container {
    flex: 1;
    display: flex;
    gap: 20px;
    padding: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.glass-card {
    background: rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    backdrop-filter: blur(15px);
    padding: 25px;
    width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.card-title {
    font-size: 20px;
    text-align: center;
}

/* Inputs */
input,select {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: white;
}


/* Buttons */
.btn-custom {
    width: 100%;
    padding: 10px;
    border-radius: 12px;
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    border: none;
    color: white;
    margin-top: 8px;
}


video {
    width: 100%;
    height:250px;
    border-radius: 12px;
    background: black;
}
.btn-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: space-between;
}

.btn-grid .btn-custom {
    width: 48%; /* two buttons per row */
    margin-top: 5px;
}
</style>
</head>

<body>
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
{% endwith %}
<div class="header">
    <h1>AI-Prioritized Management in Hospitals</h1>
    <button class="home-btn" onclick="window.location.href='/'">Home</button>
</div>

<div class="main-container">

    <!-- LEFT PANEL -->
    <div class="glass-card">
        <div class="card-title">Live Webcam</div>

        <video id="webcam" autoplay playsinline></video>
        <div id="status" style="text-align:center; margin-top:10px;"></div>
         <div class="btn-grid">
        <button type="button" class="btn-custom" onclick="startCamera()" id="startBtn">
            Start Camera
        </button>

        <button type="button" class="btn-custom" onclick="captureFace()" id="faceBtn" disabled>
            Capture Face
        </button>

        <button type="button" class="btn-custom" onclick="capturePalm()" id="palmBtn" disabled>
            Capture Palm
        </button>

        <button type="button" class="btn-custom" onclick="startVoice()" id="voiceBtn" disabled>
            Record Voice
        </button>
         </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="glass-card">
        <div class="card-title">Patient Login</div>

        <form action="login" method="POST" autocomplete="off">

            <label>Username</label>
            <input type="text" name="newusername" placeholder="Enter username" required>
            <BR>
            <label>Password</label>
            <input type="password" name="userpassword" placeholder="Enter password" required>
            <BR>
            <label>Authentication Type</label>
            <select name="authtype" id="authType" required>
                <option value="" style="color: gray; font-weight: bold;">🔐 Select Authentication Method</option>
   <option value="face" style="color: #0d6efd;">
        😊 Face Recognition
    </option>

    <option value="palm" style="color: #198754;">
        ✋ Palm Recognition
    </option>

    <option value="voice" style="color: #dc3545;">
        🎤 Voice Recognition
    </option>

            </select>
<BR>
            <button class="btn-custom" type="submit" id="signinBtn" disabled>
                Sign In
            </button>

        </form>
    </div>

</div>

<script>
let stream;
let mediaRecorder;
let chunks = [];

const startBtn = document.getElementById("startBtn");
const faceBtn = document.getElementById("faceBtn");
const palmBtn = document.getElementById("palmBtn");
const voiceBtn = document.getElementById("voiceBtn");
const signinBtn = document.getElementById("signinBtn");
const authType = document.getElementById("authType");


// ✅ Enable only selected biometric button
authType.addEventListener("change", () => {

    faceBtn.disabled = true;
    palmBtn.disabled = true;
    voiceBtn.disabled = true;
    signinBtn.disabled = true;

    const selected = authType.value;

    if (selected === "face") {
        faceBtn.disabled = false;
        setStatus("Face authentication selected 👤");

    } else if (selected === "palm") {
        palmBtn.disabled = false;
        setStatus("Palm authentication selected ✋");

    } else if (selected === "voice") {
        voiceBtn.disabled = false;
        setStatus("Voice authentication selected 🎤");
    }
});


// ✅ Start Camera
async function startCamera() {
    const video = document.getElementById("webcam");

    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        setStatus("Camera started ✅");

    } catch {
        setStatus("Camera denied ❌");
    }
}


// ✅ Face Capture
function captureFace() {
    captureImage("face", () => {
        setStatus("Face captured ✅");
        signinBtn.disabled = false;
    });
}


// ✅ Palm Capture
function capturePalm() {
    captureImage("palm", () => {
        setStatus("Palm captured ✅");
        signinBtn.disabled = false;
    });
}


// ✅ Image Capture Logic
function captureImage(type, callback) {
    const video = document.getElementById("webcam");

    if (!video.srcObject) {
        setStatus("Start camera first ❌");
        return;
    }

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    canvas.getContext("2d").drawImage(video, 0, 0);
    const imageData = canvas.toDataURL("image/png");

    fetch('/login_biometric_capture', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            image: imageData,
            type: type,
            username: document.querySelector('[name="newusername"]').value
        })
    })
    .then(callback)
    .catch(() => setStatus("Capture failed ❌"));
}


// ✅ Voice Recording
async function startVoice() {

    try {
        const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        mediaRecorder = new MediaRecorder(audioStream, {
            mimeType: 'audio/webm'
        });

        chunks = [];

        mediaRecorder.ondataavailable = e => {
            if (e.data.size > 0) chunks.push(e.data);
        };

        mediaRecorder.onstop = () => {

            const blob = new Blob(chunks, { type: 'audio/webm' });

            const formData = new FormData();
            formData.append("voice", blob, "voice.webm");
            formData.append("username", document.querySelector('[name="newusername"]').value);

            fetch('/login_voice_capture', {
                method: 'POST',
                body: formData
            });

            setStatus("Voice captured ✅");
            signinBtn.disabled = false;
        };

        mediaRecorder.start();
        setStatus("Recording voice 🎤");

        setTimeout(() => mediaRecorder.stop(), 8000);

    } catch {
        setStatus("Microphone denied ❌");
    }
}


// ✅ Status Display
function setStatus(msg) {
    document.getElementById("status").innerText = msg;
}


// ✅ Reset on Load
window.onload = () => {
    document.querySelectorAll("form").forEach(f => f.reset());

    faceBtn.disabled = true;
    palmBtn.disabled = true;
    voiceBtn.disabled = true;
    signinBtn.disabled = true;
};
</script>

</body>
</html>
