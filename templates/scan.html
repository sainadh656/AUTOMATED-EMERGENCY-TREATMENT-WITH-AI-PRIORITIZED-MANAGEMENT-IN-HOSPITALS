<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI MRI Scan Analysis</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== BACKGROUND ===== */

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(-45deg,#0ea5e9,#14b8a6,#22d3ee,#3b82f6);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
min-height:100vh;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* ===== NAVBAR ===== */

.navbar-custom{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(12px);
padding:12px 30px;
}

.navbar-custom a{
color:white;
text-decoration:none;
margin-right:20px;
font-weight:500;
transition:0.3s;
}

.navbar-custom a:hover{
color:#ffe082;
}

.logout{
background:#ff4d4d;
padding:6px 15px;
border-radius:20px;
}

.logout:hover{
background:#cc0000;
color:white;
}

/* ===== PAGE TITLE ===== */

.page-title{
text-align:center;
color:white;
margin-top:30px;
font-weight:600;
}

/* ===== DASHBOARD CARD ===== */

.dashboard-card{
max-width:700px;
margin:auto;
margin-top:30px;
border-radius:20px;
background:rgba(255,255,255,0.95);
padding:30px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

/* ===== DROP ZONE ===== */

#drop-zone{
border:2px dashed #0d6efd;
border-radius:15px;
padding:40px;
text-align:center;
cursor:pointer;
color:#6c757d;
transition:0.3s;
}

#drop-zone:hover{
background:#e0f2fe;
}

/* ===== IMAGE PREVIEW ===== */

#preview{
display:none;
margin-top:20px;
max-width:100%;
max-height:280px;
border-radius:12px;
}

/* ===== BUTTON ===== */

.btn-analyze{
margin-top:20px;
font-weight:600;
}

/* ===== RESULT BOX ===== */

.result-box{
margin-top:25px;
padding:20px;
border-radius:12px;
background:#f1f5f9;
border-left:5px solid #2563eb;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-custom d-flex justify-content-between">

<div>
<a href="{{ url_for('appointments') }}">Appointments</a>
<a href="{{ url_for('medical') }}">Medical Chat</a>
<a href="{{ url_for('nutrition') }}">Nutrition AI</a>
<a href="{{ url_for('scan') }}">MRI Scan</a>
</div>

<a href="{{ url_for('logout') }}" class="logout">Logout</a>

</nav>


<h2 class="page-title">🧠 AI MRI Scan Analysis</h2>


<div class="container">

<div class="dashboard-card">

<p class="text-center text-muted">
Upload MRI scan image for AI diagnosis
</p>

<form method="POST" action="/predict_mri" enctype="multipart/form-data">

<div id="drop-zone" onclick="document.getElementById('fileInput').click()">
📂 Drag & Drop MRI Image Here<br>
or Click to Upload
<input type="file" name="file" id="fileInput" hidden required onchange="showPreview(event)">
</div>

<img id="preview" class="img-fluid">

<button type="submit" class="btn btn-primary w-100 btn-analyze">
Analyze MRI Scan
</button>

</form>


{% if result_r %}
<div class="result-box">

<h5>🧾 Diagnosis Result</h5>

<p style="white-space: pre-wrap;">{{ result_r }}</p>

</div>
{% endif %}

</div>

</div>


<script>

function showPreview(event){

const preview=document.getElementById("preview");

preview.src=URL.createObjectURL(event.target.files[0]);

preview.style.display="block";

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
